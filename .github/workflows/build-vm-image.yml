name: Build VM Base Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'vm-image-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Alpine arm64 Docker image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t alpine-immich-base:latest \
            -f Dockerfile \
            .

      - name: Create disk image
        run: |
          set -euo pipefail

          truncate -s 8G immich-vm.img
          mkfs.ext4 -F -L "alpine-root" immich-vm.img

          sudo mkdir -p /mnt/vmroot
          sudo mount -o loop immich-vm.img /mnt/vmroot

          docker create --platform linux/arm64 --name rootfs alpine-immich-base:latest
          docker export rootfs | sudo tar -C /mnt/vmroot \
            --exclude='./dev/*' --exclude='./proc/*' \
            --exclude='./sys/*'  --exclude='./tmp/*' \
            --exclude='./run/*'  -x
          docker rm rootfs

          # resolv.conf is bind-mounted read-only by Docker during build
          echo "nameserver 192.168.64.1" | sudo tee /mnt/vmroot/etc/resolv.conf > /dev/null

          # Remove Docker marker — prevents OpenRC from booting in [DOCKER] softlevel mode
          # which skips remounting root rw and breaks Docker startup inside the VM
          sudo rm -f /mnt/vmroot/.dockerenv

          sudo mkdir -p /mnt/vmroot/{dev,proc,sys,tmp,run}
          sudo chmod 1777 /mnt/vmroot/tmp

          sudo cp /mnt/vmroot/boot/vmlinuz-virt  vmlinuz-virt-pe
          sudo cp /mnt/vmroot/boot/initramfs-virt installed-initramfs
          sudo chown "$USER:$USER" vmlinuz-virt-pe installed-initramfs

          sudo umount /mnt/vmroot

      - name: Strip kernel PE/EFI wrapper
        run: python3 scripts/strip-kernel.py vmlinuz-virt-pe installed-vmlinuz

      - name: Write root-device.txt
        run: echo "/dev/vda" > root-device.txt

      - name: Package archive
        run: |
          set -euo pipefail

          gzip -1 immich-vm.img

          tar -czf immich-base-arm64.tar.gz \
            immich-vm.img.gz \
            installed-vmlinuz \
            installed-initramfs \
            root-device.txt

          echo "Archive: $(du -sh immich-base-arm64.tar.gz | cut -f1)"
          echo "Contents:"
          tar -tzf immich-base-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-base-arm64
          path: immich-base-arm64.tar.gz
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: immich-base-arm64.tar.gz
          generate_release_notes: true
